name: CD

on:
  push:
    branches: 
      - master

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          key: "nix-eval-cache-${{ runner.os }}-${{ runner.arch }}"
          path: "~/.cache/nix"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
      - run: |
          nix build -L .#lambda-zip
          cp ./result/package.zip ./
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          path: ./package.zip
          name: "${{ runner.arch }}-${{ runner.os }}-package.zip"
      - name: set tag to latest
        # The state of tags and their relationship to releases on github is
        # crazy. I just want an action that lets me publish a zip, but I need a
        # release which needs a tag which needs to be immutable by default.
        # But I don't want a tag per push to master.  So here we are.
        run: |
          # latest-X64-Linux or latest-ARM64-Linux
          git tag -f "latest-${{ runner.arch }}-${{ runner.os }}"
          git push origin "latest-${{ runner.arch }}-${{ runner.os }}" --force
      - name: release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: "latest-${{ runner.arch }}-${{ runner.os }}"
          files: package.zip

      # just do the following one time, not for every item in the matrix 
      - run: nix profile install .#next-semver
        if: ${{ matrix.os == 'ubuntu-latest' }}
      - name: auto tag for terraform
        # turns out, terraform requires semver tags to publish public modules
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          v="$(next-semver)"
          printf "tagging with %s" "$v"
          echo "SEMVER_TAG=${v}" >> $GITHUB_ENV
          git tag "$v"
          git push origin "$v"
      - name: semver release
        # might as well also release a historical immutable copy...
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ env.SEMVER_TAG }}
          files: package.zip
